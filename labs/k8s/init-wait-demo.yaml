apiVersion: v1
kind: Pod
metadata:
  name: init-wait-demo
spec:
  initContainers:
  - name: wait-for-service
    image: busybox:1.36
    command: ['sh', '-c', 'until nslookup myservice.default.svc.cluster.local; do sleep 2; done']
  containers:
  - name: main-app
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Myservice is up! Main app running."; sleep 3600']