apiVersion: v1
kind: Service
metadata:
  name: {{ include "python-info-service.fullname" . }}-preview
  labels:
    {{- include "python-info-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "python-info-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
