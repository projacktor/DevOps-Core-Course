plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  tag:Name:
    - DevOps-Lab
  instance-state-name:
    - running

keyed_groups:
  - key: tags.Name
    prefix: tag
    separator: "_"

groups:
  webservers: true

compose:
  ansible_host: public_ip_address
  ansible_user: "ubuntu"
  ansible_ssh_private_key_file: "'~/Projects/edu/DevOps-Core-Course/labs/terraform/labsuser.pem'"
  ansible_ssh_common_args: "'-o IdentitiesOnly=yes'"