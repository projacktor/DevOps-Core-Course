---
- name: Package setup
  become: true
  tags:
    - packages
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install essential packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Fix apt dependencies
      ansible.builtin.apt:
        update_cache: true

  always:
    - name: Log package installation
      ansible.builtin.file:
        path: /tmp/packages_installed.log
        state: touch
        mode: "0644"

- name: User setup
  become: true
  tags:
    - users
  block:
    - name: User creation
      ansible.builtin.debug:
        msg: "User creation tasks would be placed here."

- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"
