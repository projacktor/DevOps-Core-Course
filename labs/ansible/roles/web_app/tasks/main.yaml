---
- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ web_app_docker_user }}"
    password: "{{ web_app_docker_pass }}"
    reauthorize: yes
  no_log: true

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ web_app_image }}"
    tag: "{{ web_app_image_tag }}"
    source: pull
    force_source: yes

- name: Remove existing container
  community.docker.docker_container:
    name: "{{ web_app_container_name }}"
    state: absent

- name: Run application container
  community.docker.docker_container:
    name: "{{ web_app_container_name }}"
    image: "{{ web_app_image }}:{{ web_app_image_tag }}"
    state: started
    recreate: yes
    pull: yes
    restart_policy: "{{ web_app_restart_policy }}"
    ports:
      - "{{ web_app_host_port }}:{{ web_app_port }}"
    env: "{{ web_app_env }}"
  register: container_info

- name: Wait for application to be ready
  wait_for:
    port: "{{ web_app_host_port }}"
    delay: 5
    timeout: 60

- name: Verify health endpoint
  uri:
    url: "http://127.0.0.1:{{ web_app_host_port }}/health"
    status_code: 200
    return_content: yes
  register: health_check
  until: health_check.status == 200
  retries: 5
  delay: 2
