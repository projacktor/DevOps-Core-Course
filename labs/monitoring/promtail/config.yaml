server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Always set job=docker as static label
      - target_label: job
        replacement: docker

      # Extract container name and remove leading /
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.+)"
        target_label: container
        replacement: "$1"

      # Add docker image name
      - source_labels: [__meta_docker_container_image_name]
        target_label: image
        replacement: "$1"

      # Keep only containers labeled logging=promtail
      - source_labels: [__meta_docker_container_label_logging]
        regex: "promtail"
        action: keep
