server.port=${PORT:8000}
server.address=${HOST:0.0.0.0}

# Application info
spring.application.name=devops-info-service

# Logging configuration
logging.level.com.devops.infoservice=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n

# Actuator endpoints (optional, for future enhancements)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always